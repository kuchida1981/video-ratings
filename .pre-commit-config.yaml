repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest unit tests (backend)
        entry: bash -c "cd backend && pytest -m unit --no-cov -q"
        language: system
        types: [python]
        pass_filenames: false

      - id: eslint
        name: eslint (frontend)
        entry: bash -c "cd frontend && npm run lint"
        language: system
        types_or: [ts, tsx, javascript]
        pass_filenames: false

      - id: tsc
        name: typescript type check (frontend)
        entry: bash -c "cd frontend && npx tsc --noEmit"
        language: system
        types_or: [ts, tsx]
        pass_filenames: false
