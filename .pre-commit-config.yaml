repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: openspec-validate
        name: openspec validate (strict)
        entry: openspec validate --strict --all --no-interactive
        language: system
        files: ^openspec/
        pass_filenames: false

      - id: pytest-unit
        name: pytest unit tests (backend)
        entry: bash -c "cd backend && uv run pytest -m unit --no-cov -q"
        language: system
        types: [python]
        pass_filenames: false

      - id: eslint
        name: eslint (frontend)
        entry: bash -c "cd frontend && (command -v npm >/dev/null && npm run lint || echo 'npm not found, skipping')"
        language: system
        types_or: [ts, tsx, javascript]
        pass_filenames: false

      - id: tsc
        name: typescript type check (frontend)
        entry: bash -c "cd frontend && (command -v npx >/dev/null && npx tsc --noEmit || echo 'npx not found, skipping')"
        language: system
        types_or: [ts, tsx]
        pass_filenames: false
