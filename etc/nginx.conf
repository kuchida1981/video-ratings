server {
    listen ${NGINX_PORT};
    # server_name を実際のホスト名やIPアドレスに変更してください
    server_name _;

    # Basic認証設定（install.sh / update.sh が生成）
    include /etc/nginx/snippets/video-ratings-auth.conf;

    # フロントエンド静的ファイル
    location / {
        root /opt/video-ratings/current/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # バックエンド静的ファイル（カバー画像など）
    location /static/ {
        proxy_pass http://127.0.0.1:${BACKEND_PORT}/static/;
    }

    # バックエンド API
    location /api/ {
        proxy_pass http://127.0.0.1:${BACKEND_PORT}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 100m;
    }

    # アップロードされた画像ファイル（任意: nginx が直接配信する場合）
    # location /uploads/ {
    #     alias /var/lib/video-ratings/uploads/;
    # }
}
