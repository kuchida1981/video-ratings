services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: video_ratings
      POSTGRES_PASSWORD: video_ratings
      POSTGRES_DB: video_ratings
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U video_ratings -d video_ratings"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://video_ratings:video_ratings@db:5432/video_ratings
      SMB_USERNAME: "kosuke"  # Samba ユーザー名を設定してください
      SMB_PASSWORD: "jG.K4-y_xXxv2QDe7EfVRjGjtZ4ghQPC"  # Samba パスワードを設定してください
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
